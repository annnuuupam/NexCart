spring.application.name=nexcart
# Render injects PORT; fall back to 9090 for local dev
server.port=${PORT:9090}

# ─────────────────────────────────────────────────
# DATABASE — Aiven MySQL with SSL REQUIRED
# Set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD in Render env vars
# ─────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-2643c186-nexcart-project.k.aivencloud.com:13169/defaultdb?sslMode=REQUIRED&useSSL=true&requireSSL=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:avnadmin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Disable open-in-view to prevent lazy-loading in the view layer and suppress startup WARN
spring.jpa.open-in-view=false

# ─────────────────────────────────────────────────
# SECURITY — custom JWT filter used; Spring Security autoconfigure is excluded
# ─────────────────────────────────────────────────
spring.security.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ─────────────────────────────────────────────────
# JWT — WARNING: Use a strong secret (64+ chars) in production via JWT_SECRET env var
# ─────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:your-very-long-secure-secret-key-for-production-12345678901234567890}
jwt.expiration=3600000

# ─────────────────────────────────────────────────
# CORS — Single source of truth is now CorsConfig.java
# ─────────────────────────────────────────────────
# ─────────────────────────────────────────────────
# LOGGING
# ─────────────────────────────────────────────────
logging.level.root=INFO
logging.level.org.springframework.web=INFO

# ─────────────────────────────────────────────────
# RAZORPAY — set RAZORPAY_KEY_ID and RAZORPAY_KEY_SECRET in Render env vars
# ─────────────────────────────────────────────────
razorpay.key_id=${RAZORPAY_KEY_ID:rzp_test_LqWBBDbgwot5lh}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:NETk6HP1NzRzufOYZ7KYfDMb}

# ─────────────────────────────────────────────────
# PASSWORD RESET / EMAIL TEMPLATES
# ─────────────────────────────────────────────────
app.frontend.base-url=${APP_FRONTEND_BASE_URL:https://nex-cart-alpha.vercel.app}
app.frontend.reset-path=${APP_FRONTEND_RESET_PATH:/reset-password}
app.mail.from=noreply@nexcart.local
app.reset.cleanup-ms=3600000
app.reset.limit.per-ip=8
app.reset.limit.per-identifier=5
app.reset.limit.window-ms=900000
app.mail.reset-template=templates/reset-password.html

# ─────────────────────────────────────────────────
# SMTP — set MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD in Render env vars
# ─────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─────────────────────────────────────────────────
# ADMIN BOOTSTRAP — First-run admin account
# ─────────────────────────────────────────────────
admin.bootstrap.username=${ADMIN_BOOTSTRAP_USERNAME:admin}
admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:admin@nexcart.local}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:Admin@123}
