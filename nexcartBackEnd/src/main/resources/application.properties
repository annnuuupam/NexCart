spring.application.name=nexcart
# Render injects PORT; fall back to 9090 for local dev
server.port=${PORT:9090}

# ─────────────────────────────────────────────────
# DATABASE — WARNING: Move credentials to env vars before committing!
# ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/nexcart?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=3062
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Disable open-in-view to prevent lazy-loading in the view layer and suppress startup WARN
spring.jpa.open-in-view=false

# ─────────────────────────────────────────────────
# SECURITY — custom JWT filter used; Spring Security autoconfigure is excluded
# ─────────────────────────────────────────────────
spring.security.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ─────────────────────────────────────────────────
# JWT — WARNING: Use a strong secret (64+ chars) in production
# ─────────────────────────────────────────────────
jwt.secret=your-very-long-secure-secret-key-for-production-12345678901234567890
jwt.expiration=3600000

# ─────────────────────────────────────────────────
# CORS
# ─────────────────────────────────────────────────
spring.web.cors.allowed-origin-patterns=http://localhost:517*
spring.web.cors.exposed-headers=*
spring.web.cors.max-age=36000
spring.web.cors.allowed-origins=http://localhost:5174,http://localhost:5175,http://localhost:5176,https://nex-cart-alpha.vercel.app,https://nex-cart-6dxfirgrk-annnuuupams-projects.vercel.app,https://nex-cart-git-main-annnuuupams-projects.vercel.app
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Content-Type,Authorization
spring.web.cors.allow-credentials=true

# ─────────────────────────────────────────────────
# LOGGING
# ─────────────────────────────────────────────────
logging.level.root=INFO
logging.level.org.springframework.web=INFO

# ─────────────────────────────────────────────────
# RAZORPAY — WARNING: Move credentials to env vars before committing!
# ─────────────────────────────────────────────────
razorpay.key_id=rzp_test_LqWBBDbgwot5lh
razorpay.key_secret=NETk6HP1NzRzufOYZ7KYfDMb

# ─────────────────────────────────────────────────
# PASSWORD RESET / EMAIL TEMPLATES
# ─────────────────────────────────────────────────
app.frontend.base-url=http://localhost:5174
app.frontend.reset-path=/reset-password
app.mail.from=noreply@nexcart.local
app.reset.cleanup-ms=3600000
app.reset.limit.per-ip=8
app.reset.limit.per-identifier=5
app.reset.limit.window-ms=900000
app.mail.reset-template=templates/reset-password.html

# ─────────────────────────────────────────────────
# SMTP — CONFIGURE THESE FOR EMAIL FEATURES TO WORK
# Until configured, forgot-password/admin-reset emails will fail silently.
#
# Gmail example:
#   spring.mail.host=smtp.gmail.com
#   spring.mail.port=587
#   spring.mail.username=you@gmail.com
#   spring.mail.password=your-app-password   (enable App Passwords in Google Account)
#
# Brevo/Sendinblue example:
#   spring.mail.host=smtp-relay.brevo.com
#   spring.mail.port=587
#   spring.mail.username=you@example.com
#   spring.mail.password=your-brevo-smtp-key
# ─────────────────────────────────────────────────
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─────────────────────────────────────────────────
# ADMIN BOOTSTRAP — First-run admin account
# ─────────────────────────────────────────────────
admin.bootstrap.username=admin
admin.bootstrap.email=admin@nexcart.local
admin.bootstrap.password=Admin@123
